workflows:
  android-release:
    name: QR Part Tracker — Android APK
    working_directory: qr_tracker_flutter/qr_tracker
    max_build_duration: 30
    environment:
      flutter: 3.22.0
      java: 17

    scripts:
      - name: Get Flutter packages
        script: flutter pub get

      - name: Analyze code
        script: flutter analyze --no-fatal-infos

      - name: Build release APK
        script: |
          flutter build apk \
            --release \
            --no-shrink \
            --build-name=1.0.0 \
            --build-number=$(($(date +%s)))

    artifacts:
      - qr_tracker_flutter/qr_tracker/build/app/outputs/flutter-apk/app-release.apk

    publishing:
      email:
        recipients:
          - teamqualite8@gmail.com
        notify:
          success: true
          failure: true
