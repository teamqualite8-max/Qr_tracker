name: qr_tracker
description: Industrial Parts QR Code Tracker - Two Control Stage System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # QR Code Scanning
  mobile_scanner: ^3.5.6

  # Camera & Image Capture
  camera: ^0.10.5+9
  image_picker: ^1.0.7

  # Local Database
  sqflite: ^2.3.2
  path: ^1.9.0
  path_provider: ^2.1.2

  # File Picker for CSV Import
  file_picker: ^6.1.1

  # CSV Parsing
  csv: ^6.0.0

  # Permissions
  permission_handler: ^11.3.0

  # UI Extras
  intl: ^0.19.0
  flutter_animate: ^4.5.0
  gap: ^3.0.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
